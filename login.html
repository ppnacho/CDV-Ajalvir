<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso privado · CD Veteranos Ajalvir</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="login-body">
    <main class="login-card">
        <h1>Acceso privado</h1>
        <p>CD Veteranos Ajalvir</p>

        <form id="loginForm" class="login-form">
            <label for="dni">DNI</label>
            <input type="text" id="dni" autocomplete="username" required placeholder="12345678A">

            <label for="password">Contraseña</label>
            <input type="password" id="password" autocomplete="current-password" required placeholder="Contraseña">

            <button type="submit">Entrar</button>
        </form>

        <p id="loginError" class="error"></p>
        <p><a href="index.html">Volver a la página principal</a></p>
    </main>

    <script type="module">
        import { loginConDni } from "./assets/js/auth.js";

        const form = document.getElementById("loginForm");
        const error = document.getElementById("loginError");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            error.textContent = "";

            try {
                const usuario = await loginConDni(
                    document.getElementById("dni").value,
                    document.getElementById("password").value
                );

                if (usuario.rol === "administrador") {
                    window.location.href = "directiva/usuarios.html";
                }
                else if (usuario.rol === "directiva") {
                    window.location.href = "directiva/index.html";
                } else {
                    window.location.href = "socios/index.html";
                }
            } catch (err) {
                error.textContent = "DNI o contraseña incorrectos, usuario no activo o sin permisos.";
            }
        });
    </script>
</body>

</html>
